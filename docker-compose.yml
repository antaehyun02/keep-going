version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skinai}
      POSTGRES_USER: ${POSTGRES_USER:-skinai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skinai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai:
    build:
      context: .
      dockerfile: docker/ai/Dockerfile
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_PORT: "5001"
      MODEL_PATH: /app/ai/checkpoints/aihub/best.pth
      MODEL_BACKBONE: ${MODEL_BACKBONE:-densenet121}
      THRESHOLD_PATH: /app/ai/checkpoints/aihub/thresholds.json
      DATA_CSV: /app/ai/preprocessing/processed_aihub/train.csv
      DEVICE: ${DEVICE:-auto}
    volumes:
      - ./ai/checkpoints:/app/ai/checkpoints:ro
      - ./ai/preprocessing/processed_aihub:/app/ai/preprocessing/processed_aihub:ro
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-skinai}
      DB_USER: ${POSTGRES_USER:-skinai_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai:5001
      AI_REQUEST_TIMEOUT: "30000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
