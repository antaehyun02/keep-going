<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SkinAI - 로그인</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#ffffff;
    color:#1a1a2e;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .container { width:100%; max-width:400px; }

  .logo-wrap { text-align:center; margin-bottom:36px; }
  .logo-badge { display:inline-flex; align-items:center; gap:10px; margin-bottom:14px; }
  .logo-icon { width:44px; height:44px; background:#2563eb; border-radius:12px; display:flex; align-items:center; justify-content:center; }
  .logo-icon svg { width:24px; height:24px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .logo-text { font-size:24px; font-weight:800; color:#1a1a2e; letter-spacing:-0.5px; }
  .logo-text span { color:#2563eb; }
  .logo-desc { font-size:13px; color:#6b7280; line-height:1.5; }

  .card { background:#fff; border:1px solid #e5e7eb; border-radius:20px; padding:36px 32px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  .card-title { font-size:20px; font-weight:700; color:#111827; margin-bottom:4px; letter-spacing:-0.3px; }
  .card-sub { font-size:13px; color:#9ca3af; margin-bottom:28px; }

  .role-select { display:flex; gap:8px; margin-bottom:24px; }
  .role-btn { flex:1; padding:9px 8px; border:1.5px solid #e5e7eb; border-radius:10px; background:#fff; font-size:12px; font-weight:600; color:#9ca3af; cursor:pointer; transition:all 0.2s; text-align:center; font-family:inherit; }
  .role-btn.active { border-color:#2563eb; color:#2563eb; background:#eff6ff; }

  .field { margin-bottom:18px; }
  .field-label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:7px; }
  .input-wrap { position:relative; }
  .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:#9ca3af; pointer-events:none; }

  input[type=email], input[type=password], input[type=text] {
    width:100%; padding:12px 14px 12px 42px;
    border:1px solid #e5e7eb; border-radius:12px;
    font-size:14px; color:#111827; background:#f9fafb;
    outline:none; transition:all 0.2s; font-family:inherit;
  }
  input:focus { border-color:#2563eb; background:#fff; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  input::placeholder { color:#c4cad4; }

  .pw-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#9ca3af; padding:0; display:flex; align-items:center; }

  .options { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .checkbox-wrap { display:flex; align-items:center; gap:7px; cursor:pointer; }
  .checkbox-wrap input[type=checkbox] { display:none; }
  .custom-check { width:17px; height:17px; border:1.5px solid #d1d5db; border-radius:5px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
  .checkbox-wrap input:checked + .custom-check { background:#2563eb; border-color:#2563eb; }
  .check-icon { width:10px; height:10px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; opacity:0; transition:opacity 0.15s; }
  .checkbox-wrap input:checked + .custom-check .check-icon { opacity:1; }
  .check-label { font-size:13px; color:#6b7280; }
  .forgot-link { font-size:13px; color:#2563eb; text-decoration:none; font-weight:500; }
  .forgot-link:hover { text-decoration:underline; }

  .error-msg { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:10px 14px; font-size:13px; color:#dc2626; display:none; align-items:center; gap:8px; margin-bottom:16px; }
  .error-msg.show { display:flex; }

  .login-btn { width:100%; padding:14px; background:#2563eb; color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; letter-spacing:-0.2px; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; }
  .login-btn:hover { background:#1d4ed8; }
  .login-btn:active { transform:scale(0.98); }
  .login-btn:disabled { opacity:0.6; cursor:not-allowed; }

  .btn-spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
  .login-btn.loading .btn-spinner { display:block; }
  .login-btn.loading .btn-text { display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .card-footer { text-align:center; margin-top:22px; font-size:13px; color:#9ca3af; }
  .card-footer a { color:#2563eb; font-weight:600; text-decoration:none; }
  .card-footer a:hover { text-decoration:underline; }

  .trust-bar { display:flex; justify-content:center; gap:20px; margin-top:28px; }
  .trust-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#c4cad4; }
  .trust-dot { width:6px; height:6px; border-radius:50%; background:#d1fae5; border:1px solid #6ee7b7; }
</style>
</head>
<body>
<div class="container">

  <div class="logo-wrap">
    <div class="logo-badge">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 4-3 7-7 9-4-2-7-5-7-9a7 7 0 0 1 7-7z"/><path d="M12 8v4M10 10h4"/></svg>
      </div>
      <div class="logo-text">Skin<span>AI</span></div>
    </div>
    <div class="logo-desc">안면부 피부질환 AI 분류 학습 플랫폼</div>
  </div>

  <div class="card">
    <div class="card-title">로그인</div>
    <div class="card-sub">계속하려면 로그인하세요</div>

    <!-- onclick 없이 data-role만 -->
    <div class="role-select" id="roleSelect">
      <button class="role-btn active" data-role="resident">전공의</button>
      <button class="role-btn" data-role="student">의대생</button>
      <button class="role-btn" data-role="professor">교수</button>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText"></span>
    </div>

    <div class="field">
      <label class="field-label">이메일</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/>
        </svg>
        <input type="email" id="emailInput" placeholder="hospital@med.ac.kr" autocomplete="email">
      </div>
    </div>

    <div class="field">
      <label class="field-label">비밀번호</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <!-- onclick 제거 — id로 JS에서 바인딩 -->
        <input type="password" id="pwInput" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        <button class="pw-toggle" id="pwToggle" type="button">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="options">
      <label class="checkbox-wrap">
        <input type="checkbox" id="remember">
        <div class="custom-check">
          <svg class="check-icon" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
        </div>
        <span class="check-label">로그인 상태 유지</span>
      </label>
      <a href="#" class="forgot-link">비밀번호 찾기</a>
    </div>

    <!-- onclick 제거 — id로 JS에서 바인딩 -->
    <button class="login-btn" id="loginBtn">
      <div class="btn-spinner"></div>
      <span class="btn-text">로그인</span>
    </button>
  </div>

  <div class="card-footer">
    계정이 없으신가요? <a href="singup.html">회원가입</a>
  </div>

  <div class="trust-bar">
    <div class="trust-item"><div class="trust-dot"></div> 의료정보 보호</div>
    <div class="trust-item"><div class="trust-dot"></div> SSL 암호화</div>
    <div class="trust-item"><div class="trust-dot"></div> HIPAA 준수</div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
