<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SkinAI - 비밀번호 찾기</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#ffffff; color:#1a1a2e;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .container { width:100%; max-width:400px; }
  .logo-wrap { text-align:center; margin-bottom:36px; }
  .logo-badge { display:inline-flex; align-items:center; gap:10px; margin-bottom:14px; }
  .logo-icon { width:44px; height:44px; background:#2563eb; border-radius:12px; display:flex; align-items:center; justify-content:center; }
  .logo-icon svg { width:24px; height:24px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .logo-text { font-size:24px; font-weight:800; color:#1a1a2e; letter-spacing:-0.5px; }
  .logo-text span { color:#2563eb; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:20px; padding:36px 32px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  .card-title { font-size:20px; font-weight:700; color:#111827; margin-bottom:4px; letter-spacing:-0.3px; }
  .card-sub { font-size:13px; color:#9ca3af; margin-bottom:28px; line-height:1.6; }
  .field { margin-bottom:18px; }
  .field-label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:7px; }
  .input-wrap { position:relative; }
  .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:#9ca3af; pointer-events:none; }
  input[type=email] {
    width:100%; padding:12px 14px 12px 42px;
    border:1px solid #e5e7eb; border-radius:12px;
    font-size:14px; color:#111827; background:#f9fafb;
    outline:none; transition:all 0.2s; font-family:inherit;
  }
  input:focus { border-color:#2563eb; background:#fff; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  input::placeholder { color:#c4cad4; }
  .error-msg { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:10px 14px; font-size:13px; color:#dc2626; display:none; align-items:center; gap:8px; margin-bottom:16px; }
  .error-msg.show { display:flex; }
  .submit-btn { width:100%; padding:14px; background:#2563eb; color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; }
  .submit-btn:hover { background:#1d4ed8; }
  .submit-btn:active { transform:scale(0.98); }
  .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
  .btn-spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
  .submit-btn.loading .btn-spinner { display:block; }
  .submit-btn.loading .btn-text { display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .success-wrap { display:none; flex-direction:column; align-items:center; text-align:center; }
  .success-wrap.show { display:flex; }
  .success-icon { width:60px; height:60px; background:#d1fae5; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .success-icon svg { width:30px; height:30px; fill:none; stroke:#059669; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
  .success-title { font-size:18px; font-weight:700; color:#111827; margin-bottom:8px; }
  .success-desc { font-size:13px; color:#6b7280; line-height:1.8; margin-bottom:24px; }
  .card-footer { text-align:center; margin-top:22px; font-size:13px; color:#9ca3af; }
  .card-footer a { color:#2563eb; font-weight:600; text-decoration:none; }
  .card-footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo-badge">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 4-3 7-7 9-4-2-7-5-7-9a7 7 0 0 1 7-7z"/><path d="M12 8v4M10 10h4"/></svg>
      </div>
      <div class="logo-text">Skin<span>AI</span></div>
    </div>
  </div>

  <div class="card">
    <div id="formSection">
      <div class="card-title">비밀번호 찾기</div>
      <div class="card-sub">가입 시 등록한 이메일을 입력하시면<br>비밀번호 재설정 링크를 보내드립니다.</div>

      <div class="error-msg" id="errorMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText"></span>
      </div>

      <div class="field">
        <label class="field-label">이메일</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/>
          </svg>
          <input type="email" id="emailInput" placeholder="hospital@med.ac.kr" autocomplete="email">
        </div>
      </div>

      <button class="submit-btn" id="submitBtn">
        <div class="btn-spinner"></div>
        <span class="btn-text">재설정 링크 보내기</span>
      </button>
    </div>

    <div class="success-wrap" id="successSection">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-title">이메일을 확인하세요</div>
      <div class="success-desc" id="successDesc"></div>
      <button class="submit-btn" style="max-width:200px;" onclick="location.href='login.html'">
        <span class="btn-text">로그인으로 돌아가기</span>
      </button>
    </div>
  </div>

  <div class="card-footer"><a href="login.html">← 로그인으로 돌아가기</a></div>
</div>
<script src="forgot_password.js"></script>
</body>
</html>
